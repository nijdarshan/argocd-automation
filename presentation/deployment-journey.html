<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deployment Lifecycle — Interactive Journey</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f47067;
  --amber: #d29922;
  --blue: #58a6ff;
  --purple: #bc8cff;
  --pending-bg: #21262d;
  --progress-bg: #0d1f3c;
  --healthy-bg: #0d2818;
  --unhealthy-bg: #3b1218;
  --approval-bg: #2a1f05;
  --rolled-bg: #1f1505;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }

/* HEADER */
.header { display:flex; align-items:center; justify-content:space-between; padding:8px 24px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.tabs { display:flex; gap:4px; }
.tab { padding:6px 16px; border-radius:6px; font-size:0.8rem; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all 0.2s; font-family:inherit; }
.tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.tab:hover:not(.active) { border-color:var(--muted); color:var(--text); }

/* SCENE HEADER */
.scene-header { padding:10px 24px 6px; flex-shrink:0; }
.scene-title { font-size:1.3rem; font-weight:700; margin-bottom:2px; }
.scene-subtitle { font-size:0.85rem; color:var(--muted); }

/* MAIN CONTENT */
.main { display:flex; flex:1; overflow:hidden; }
.diagram-area { flex:0 0 70%; padding:16px 24px; display:flex; align-items:center; justify-content:center; position:relative; }
.data-panel { flex:0 0 30%; border-left:1px solid var(--border); background:var(--surface); display:flex; flex-direction:column; }
.data-panel-header { padding:12px 16px; border-bottom:1px solid var(--border); font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
.data-panel-content { flex:1; overflow-y:auto; padding:12px 16px; font-family:'JetBrains Mono',monospace; font-size:0.72rem; line-height:1.7; white-space:pre-wrap; word-break:break-word; }

/* FOOTER NAV (hidden, navigation via keyboard only) */
.footer { display:none; }

/* DIAGRAM ELEMENTS */
.diagram-svg { width:100%; height:100%; }
.box { rx:8; ry:8; stroke-width:2; }
.box-label { font-family:'DM Sans',sans-serif; font-weight:600; text-anchor:middle; dominant-baseline:central; }
.box-sub { font-family:'DM Sans',sans-serif; font-weight:400; font-size:11px; text-anchor:middle; dominant-baseline:central; fill:var(--muted); }
.arrow-line { stroke-width:2; fill:none; stroke-dasharray:6 4; }
.arrow-head { fill:var(--muted); }
.glow { filter:drop-shadow(0 0 8px currentColor); }

/* STATUS BADGES */
.status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; }

/* JSON HIGHLIGHTING */
.json-key { color:#7ee787; }
.json-str { color:#a5d6ff; }
.json-num { color:#d2a8ff; }
.json-bool { color:#ffa657; }
.json-null { color:var(--muted); }
.json-bracket { color:var(--muted); }
.json-changed { background:#d2992233; border-radius:2px; transition:background 0.8s; }

/* APPROVAL BUTTON */
.approve-btn { padding:10px 28px; border-radius:8px; font-size:0.9rem; font-weight:700; cursor:pointer; border:2px solid var(--amber); background:var(--approval-bg); color:var(--amber); font-family:inherit; transition:all 0.2s; position:absolute; z-index:10; }
.approve-btn:hover { background:var(--amber); color:#000; }
.approve-btn.hidden { display:none; }
</style>
</head>
<body>

<div class="header">
  <div class="tabs">
    <button class="tab active" data-flow="deploy" onclick="switchFlow('deploy')">Deploy</button>
    <button class="tab" data-flow="rollback" onclick="switchFlow('rollback')">Rollback</button>
  </div>
</div>

<div class="scene-header">
  <div class="scene-title" id="sceneTitle">Architecture Overview</div>
  <div class="scene-subtitle" id="sceneSubtitle">The system components involved in a CNF deployment</div>
</div>

<div class="main">
  <div class="diagram-area" id="diagramArea">
    <svg class="diagram-svg" id="diagramSvg" viewBox="0 0 900 500"></svg>
    <button class="approve-btn hidden" id="approveBtn" onclick="handleApprove()">Approve &amp; Continue</button>
  </div>
  <div class="data-panel">
    <div class="data-panel-header">Runtime State (Hub DB)</div>
    <div class="data-panel-content" id="dataPanel"></div>
  </div>
</div>

<div class="footer">
  <button class="nav-btn" id="prevBtn" onclick="prevScene()">&larr; Prev</button>
  <div class="scene-counter" id="sceneCounter">Scene 1 of 10</div>
  <button class="nav-btn" id="nextBtn" onclick="nextScene()">Next &rarr;</button>
</div>

<script>
const COLORS = { pending:'#8b949e', progress:'#58a6ff', healthy:'#3fb950', unhealthy:'#f47067', amber:'#d29922', rolled:'#d29922', purple:'#bc8cff' };
const BG = { pending:'#21262d', progress:'#0d1f3c', healthy:'#0d2818', unhealthy:'#3b1218', amber:'#2a1f05', rolled:'#1f1505' };

let currentFlow = 'deploy';
let currentScene = 0;
let approvalNeeded = false;

/* ─── SCENE DEFINITIONS ─── */

const deployScenes = [
  { title:'Architecture Overview', sub:'The system components involved in a CNF deployment' },
  { title:'Deployment Request', sub:'A Helix ticket triggers the deployment process' },
  { title:'App-Config Resolution', sub:'The Hub resolves placeholders and stores the payload' },
  { title:'CMS Deploy — Orchestrator to Cluster', sub:'Sequential charts flow through GitOps → ArgoCD → OCP' },
  { title:'CMS Healthy → Approval Required', sub:'Hub detects manual_approval in app-config and pauses for confirmation' },
  { title:'Manual Approval Gate', sub:'Hub pauses — awaiting human confirmation' },
  { title:'Batch Deployment (MTAS + FTAS)', sub:'Two components deploy in parallel as batch 3' },
  { title:'All Complete — SUCCESS', sub:'Every component healthy, deployment finalized' },
];

const rollbackScenes = [
  { title:'Failure Detected', sub:'IMC health check fails — pods not ready' },
  { title:'Rollback Decision', sub:'Hub checks auto_rollback config for the failed component' },
  { title:'Git Revert', sub:'Orchestrator reverts the component commit in the GitOps repo' },
  { title:'ArgoCD Sync + Validate', sub:'ArgoCD syncs the reverted state and health checks confirm rollback' },
  { title:'Full-Stack Rollback', sub:'Hub triggers rollbacks in reverse deployment order' },
];

function getScenes() { return currentFlow === 'deploy' ? deployScenes : rollbackScenes; }

/* ─── DATA PANEL STATES ─── */

const deployData = [
  // 0: Architecture
  { note: '// No deployment active yet\n// System components:\n//   Hub, Orchestrator, ArgoCD,\n//   GitOps Repo, DB, OCP Cluster' },
  // 1: Request
  { deployment_id:'deploy-2026-02-09-001', action:'deploy', status:'pending', runtime:{ deployed:[], current:null, pending_approval:false, component_results:{} } },
  // 2: Resolution
  { deployment_id:'deploy-2026-02-09-001', action:'deploy', status:'pending', _note:'// Placeholders resolved:\n// {{ ip_range | CMS | oam }}\n//   → "10.224.1.0/28"\n// {{ dc_name | namespace | CMS }}\n//   → "ims-cms-slough"\n// {{ replicas | IMC | SM }}\n//   → 3', runtime:{ deployed:[], current:null, pending_approval:false } },
  // 3: CMS Deploy — Orchestrator to Cluster
  { deployment_id:'deploy-2026-02-09-001', action:'deploy', status:'in_progress', runtime:{ deployed:[], current:'cms', pending_approval:false, component_results:{ cms:{ status:'in_progress', commit_sha:'a1b2c3d', charts:{ cmsplatform:{ status:'healthy' }, cmsnfv:{ status:'in_progress' } } } } } },
  // 4: CMS Healthy → Approval Required
  { deployment_id:'deploy-2026-02-09-001', action:'deploy', status:'in_progress', _note:'// Orchestrator reports CMS healthy\n// Hub checks app-config:\n//   cms.deployment_config\n//     .manual_approval = true\n// → pending_approval set to true', runtime:{ deployed:['cms'], current:null, pending_approval:true, component_results:{ cms:{ status:'healthy' } } } },
  // 5: Manual Approval
  { deployment_id:'deploy-2026-02-09-001', action:'deploy', status:'in_progress', runtime:{ deployed:['cms'], current:null, pending_approval:true, component_results:{ cms:{ status:'healthy' } } } },
  // 6: Batch Deploy
  { deployment_id:'deploy-2026-02-09-001', action:'deploy', status:'in_progress', runtime:{ deployed:['cms','imc'], current:'mtas,ftas', pending_approval:false, component_results:{ cms:{ status:'healthy' }, imc:{ status:'healthy' }, mtas:{ status:'in_progress' }, ftas:{ status:'in_progress' } } } },
  // 7: SUCCESS
  { deployment_id:'deploy-2026-02-09-001', action:'deploy', status:'success', runtime:{ deployed:['cms','imc','mtas','ftas','agw','enumfe','sceas','lrf','muag','fuag','crdl','cbf','lixp','mrf'], current:null, pending_approval:false, component_results:{ cms:{ status:'healthy' }, imc:{ status:'healthy' }, mtas:{ status:'healthy' }, ftas:{ status:'healthy' }, crdl:{ status:'healthy' }, mrf:{ status:'healthy' } } } },
];

const rollbackData = [
  // 0: Failure
  { deployment_id:'deploy-2026-02-09-001', status:'in_progress', runtime:{ deployed:['cms'], current:'imc', pending_approval:false, component_results:{ cms:{ status:'healthy' }, imc:{ status:'unhealthy', error:'pods_ready: 4/6', charts:{ imc:{ status:'unhealthy' } } } } } },
  // 1: Decision
  { deployment_id:'deploy-2026-02-09-001', status:'in_progress', _note:'// Hub checks:\n//   imc.deployment_config\n//     .auto_rollback = true\n// → Automatic rollback triggered', runtime:{ deployed:['cms'], current:'imc', component_results:{ imc:{ status:'unhealthy', auto_rollback:true } } } },
  // 2: Git Revert
  { deployment_id:'deploy-2026-02-09-001', action:'rollback', status:'in_progress', runtime:{ deployed:['cms'], current:'imc', component_results:{ imc:{ status:'rolling_back', commit_sha:'a1b2c3d → REVERT', charts:{ imc:{ status:'rolling_back' } } } } } },
  // 3: ArgoCD Sync + Validate
  { deployment_id:'deploy-2026-02-09-001', action:'rollback', status:'in_progress', runtime:{ deployed:['cms'], current:'imc', component_results:{ imc:{ status:'rolled_back', charts:{ imc:{ status:'rolled_back', synced_at:'2026-02-09T10:55Z', health_report:{ pods_ready:'6/6' } } } } } } },
  // 4: Full-Stack
  { deployment_id:'deploy-2026-02-09-001', action:'rollback', status:'rolled_back', _note:'// Full-stack rollback:\n//   Reverse order:\n//   mrf → lixp → cbf → crdl\n//   → fuag → muag → ...\n//   → cms', runtime:{ deployed:[], current:null, component_results:{ mrf:{ status:'rolled_back' }, crdl:{ status:'rolled_back' }, imc:{ status:'rolled_back' }, cms:{ status:'rolled_back' } } } },
];

function getData() { return currentFlow === 'deploy' ? deployData : rollbackData; }

/* ─── JSON RENDERING ─── */

function syntaxHighlight(obj, indent) {
  indent = indent || 0;
  const pad = '  '.repeat(indent);
  if (obj === null) return '<span class="json-null">null</span>';
  if (typeof obj === 'boolean') return `<span class="json-bool">${obj}</span>`;
  if (typeof obj === 'number') return `<span class="json-num">${obj}</span>`;
  if (typeof obj === 'string') return `<span class="json-str">"${obj}"</span>`;
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '<span class="json-bracket">[]</span>';
    const items = obj.map(v => pad + '  ' + syntaxHighlight(v, indent+1));
    return '<span class="json-bracket">[</span>\n' + items.join(',\n') + '\n' + pad + '<span class="json-bracket">]</span>';
  }
  const keys = Object.keys(obj).filter(k => !k.startsWith('_'));
  if (keys.length === 0) return '<span class="json-bracket">{}</span>';
  const lines = keys.map(k => {
    const val = syntaxHighlight(obj[k], indent+1);
    return pad + '  <span class="json-key">"' + k + '"</span>: ' + val;
  });
  let result = '<span class="json-bracket">{</span>\n' + lines.join(',\n') + '\n' + pad + '<span class="json-bracket">}</span>';
  return result;
}

function renderData(sceneIdx) {
  const panel = document.getElementById('dataPanel');
  const data = getData()[sceneIdx];
  if (!data) { panel.innerHTML = ''; return; }
  if (data.note) { panel.innerHTML = '<span class="json-null">' + data.note + '</span>'; return; }
  let html = '';
  if (data._note) html += '<span class="json-null">' + data._note + '</span>\n\n';
  const display = {};
  Object.keys(data).filter(k => !k.startsWith('_')).forEach(k => display[k] = data[k]);
  html += syntaxHighlight(display);
  panel.innerHTML = html;
}

/* ─── SVG DIAGRAM RENDERING ─── */

function clearDiagram() {
  document.getElementById('diagramSvg').innerHTML = '';
  document.getElementById('approveBtn').classList.add('hidden');
  approvalNeeded = false;
}

function svgEl(tag, attrs, text) {
  let el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  if (text !== undefined) el.textContent = text;
  return el;
}

function addBox(svg, x, y, w, h, fill, stroke, label, sub, id) {
  const g = svgEl('g', { id: id || '' });
  g.appendChild(svgEl('rect', { x, y, width:w, height:h, rx:10, ry:10, fill, stroke, 'stroke-width':2 }));
  g.appendChild(svgEl('text', { x:x+w/2, y:y+h/2-(sub?8:0), 'text-anchor':'middle', 'dominant-baseline':'central', fill:'#e6edf3', 'font-size':'14', 'font-weight':'600', 'font-family':'DM Sans,sans-serif' }, label));
  if (sub) g.appendChild(svgEl('text', { x:x+w/2, y:y+h/2+12, 'text-anchor':'middle', 'dominant-baseline':'central', fill:'#8b949e', 'font-size':'11', 'font-family':'DM Sans,sans-serif' }, sub));
  svg.appendChild(g);
  return g;
}

function addArrow(svg, x1, y1, x2, y2, color, id) {
  const mkId = 'ah'+(id||Math.random().toString(36).slice(2));
  const defs = svg.querySelector('defs') || svg.appendChild(svgEl('defs'));
  const marker = svgEl('marker', { id:mkId, viewBox:'0 0 10 7', refX:'10', refY:'3.5', markerWidth:'8', markerHeight:'6', orient:'auto-start-reverse' });
  marker.appendChild(svgEl('path', { d:'M 0 0 L 10 3.5 L 0 7 z', fill:color||'#8b949e' }));
  defs.appendChild(marker);
  const line = svgEl('line', { x1, y1, x2, y2, stroke:color||'#8b949e', 'stroke-width':'2', 'marker-end':`url(#${mkId})`, id: id||'' });
  svg.appendChild(line);
  return line;
}

function addPath(svg, d, color, id) {
  const mkId = 'ap'+(id||Math.random().toString(36).slice(2));
  const defs = svg.querySelector('defs') || svg.appendChild(svgEl('defs'));
  const marker = svgEl('marker', { id:mkId, viewBox:'0 0 10 7', refX:'10', refY:'3.5', markerWidth:'8', markerHeight:'6', orient:'auto-start-reverse' });
  marker.appendChild(svgEl('path', { d:'M 0 0 L 10 3.5 L 0 7 z', fill:color||'#8b949e' }));
  defs.appendChild(marker);
  const p = svgEl('path', { d, stroke:color||'#8b949e', 'stroke-width':'2', fill:'none', 'marker-end':`url(#${mkId})`, id:id||'' });
  svg.appendChild(p);
  return p;
}

function addDiamond(svg, cx, cy, size, fill, stroke, line1, line2) {
  const g = svgEl('g');
  const half = size/2;
  g.appendChild(svgEl('polygon', { points:`${cx},${cy-half} ${cx+half},${cy} ${cx},${cy+half} ${cx-half},${cy}`, fill, stroke, 'stroke-width':2 }));
  g.appendChild(svgEl('text', { x:cx, y:cy-(line2?6:0), 'text-anchor':'middle', 'dominant-baseline':'central', fill:'#e6edf3', 'font-size':'11', 'font-weight':'600', 'font-family':'DM Sans,sans-serif' }, line1));
  if (line2) g.appendChild(svgEl('text', { x:cx, y:cy+8, 'text-anchor':'middle', 'dominant-baseline':'central', fill:'#e6edf3', 'font-size':'11', 'font-weight':'600', 'font-family':'DM Sans,sans-serif' }, line2));
  svg.appendChild(g);
  return g;
}

function addLabel(svg, x, y, text, color, size) {
  const t = svgEl('text', { x, y, fill:color||'#8b949e', 'font-size':size||'11', 'font-family':'DM Sans,sans-serif', 'text-anchor':'middle', 'dominant-baseline':'central' }, text);
  svg.appendChild(t);
  return t;
}

/* ─── DEPLOY SCENE RENDERERS ─── */

function renderDeployScene(idx) {
  const svg = document.getElementById('diagramSvg');
  clearDiagram();
  const renderers = [drawArch, drawRequest, drawResolution, drawCMSDeploy, drawHealthCheck, drawApprovalGate, drawBatchDeploy, drawSuccess];
  if (renderers[idx]) renderers[idx](svg);
}

function drawArch(svg) {
  svg.setAttribute('viewBox','0 0 920 365');

  // Row 1: Service Orchestrator (centered, prominent)
  const hub = addBox(svg, 335, 10, 230, 55, BG.progress, COLORS.progress, 'Service Orchestrator', 'Stateful · API-driven');
  hub.id = 'archHub';

  // Row 2: GitOps — ArgoCD (no Orchestrator — orchestrator commits directly)
  addBox(svg, 355, 125, 190, 55, BG.pending, COLORS.pending, 'GitOps Repo', 'Source of truth');
  addBox(svg, 640, 125, 190, 55, BG.pending, COLORS.pending, 'ArgoCD', 'Declarative sync');

  // Row 3: Hub DB — Nexus — OCP Cluster
  addBox(svg, 70, 275, 190, 55, BG.pending, COLORS.pending, 'Hub Database', 'Deployment state');
  addBox(svg, 355, 275, 190, 55, BG.pending, COLORS.pending, 'Nexus / Quay', 'Charts + Images');
  addBox(svg, 640, 275, 190, 55, BG.pending, COLORS.pending, 'OCP Cluster', 'Kubernetes workloads');

  // --- Arrows ---

  // Orchestrator → GitOps (commits)
  addPath(svg, 'M 385 65 L 385 98 L 450 98 L 450 125', COLORS.progress, 'a1');
  addLabel(svg, 415, 90, 'commits', COLORS.progress, '10');

  // GitOps → ArgoCD (horizontal)
  addArrow(svg, 545, 152, 640, 152, COLORS.pending, 'a2');
  addLabel(svg, 593, 142, 'detects', COLORS.muted, '10');

  // ArgoCD → OCP Cluster (vertical down)
  addArrow(svg, 735, 180, 735, 275, COLORS.pending, 'a3');
  addLabel(svg, 770, 227, 'syncs', COLORS.muted, '10');

  // Orchestrator → ArgoCD (watches)
  addPath(svg, 'M 515 65 L 515 98 L 735 98 L 735 125', COLORS.progress, 'a4');
  addLabel(svg, 625, 90, 'watches', COLORS.progress, '10');

  // Orchestrator → Hub DB (reads/writes)
  addPath(svg, 'M 370 65 L 370 98 L 165 98 L 165 275', COLORS.progress, 'a5');
  addLabel(svg, 268, 90, 'reads / writes', COLORS.muted, '10');

  // Nexus → GitOps (vertical up)
  addArrow(svg, 450, 275, 450, 180, COLORS.pending, 'a6');
  addLabel(svg, 490, 227, 'chart refs', COLORS.muted, '9');

  // Animate: Hub first, then rows stagger in
  const tl = gsap.timeline();
  tl.from('#archHub', { opacity:0, scale:0.9, duration:0.4, ease:'back.out(1.7)' });
  tl.from('#diagramSvg > g:not(#archHub)', { opacity:0, y:15, duration:0.35, stagger:0.06, ease:'power2.out' }, 0.2);
  tl.from('#diagramSvg > line, #diagramSvg > path', { opacity:0, duration:0.3, stagger:0.05 }, 0.5);
}

function drawRequest(svg) {
  svg.setAttribute('viewBox','0 0 900 400');
  addBox(svg, 50, 150, 200, 80, '#1a1520', '#bc8cff', 'HELIX-12345', 'Deployment request');
  addArrow(svg, 250, 190, 350, 190, COLORS.purple, 'r1');
  addLabel(svg, 300, 178, 'triggers', COLORS.purple, '11');
  addBox(svg, 350, 150, 220, 80, BG.progress, COLORS.progress, 'Service Orchestrator', 'Creates deployment record');
  addArrow(svg, 570, 190, 670, 190, COLORS.progress, 'r2');
  addBox(svg, 670, 150, 180, 80, BG.pending, COLORS.pending, 'Database', 'status: "pending"');

  gsap.from('#diagramSvg > g', { x:-30, opacity:0, duration:0.5, stagger:0.2, ease:'power2.out' });
  gsap.from('#diagramSvg > line', { opacity:0, duration:0.3, stagger:0.15, delay:0.3 });
}

function drawResolution(svg) {
  svg.setAttribute('viewBox','0 0 900 420');
  addBox(svg, 30, 30, 200, 60, BG.amber, COLORS.amber, 'app-config.json', 'Template + placeholders');
  addArrow(svg, 230, 60, 330, 60, COLORS.amber, 'rs1');
  addLabel(svg, 280, 48, 'input', COLORS.amber, '10');
  addBox(svg, 330, 30, 240, 60, BG.progress, COLORS.progress, 'Hub — Resolve', 'CIQ + IP data → concrete values');
  addArrow(svg, 570, 60, 660, 60, COLORS.green, 'rs2');
  addLabel(svg, 615, 48, 'store', COLORS.green, '10');
  addBox(svg, 660, 30, 200, 60, BG.healthy, COLORS.green, 'Database', 'Resolved payload');

  addLabel(svg, 450, 120, 'Placeholder examples — resolved from CIQ blueprint + IP allocation', COLORS.muted, '11');

  addBox(svg, 60, 145, 310, 48, '#1a1520', '#30363d', '{{ ip_range | CMS | oam }}', 'Before');
  addArrow(svg, 370, 169, 440, 169, COLORS.green, 'rs3');
  addBox(svg, 440, 145, 310, 48, BG.healthy, '#30363d', '"10.224.1.0/28"', 'After');

  addBox(svg, 60, 220, 310, 48, '#1a1520', '#30363d', '{{ dc_name | namespace | CMS }}', 'Before');
  addArrow(svg, 370, 244, 440, 244, COLORS.green, 'rs4');
  addBox(svg, 440, 220, 310, 48, BG.healthy, '#30363d', '"ims-cms-slough"', 'After');

  addBox(svg, 60, 295, 310, 48, '#1a1520', '#30363d', '{{ replicas | IMC | SM }}', 'Before');
  addArrow(svg, 370, 319, 440, 319, COLORS.green, 'rs5');
  addBox(svg, 440, 295, 310, 48, BG.healthy, '#30363d', '3', 'After (integer)');

  gsap.from('#diagramSvg > g', { opacity:0, y:20, duration:0.4, stagger:0.1, ease:'power2.out' });
}

function drawCMSDeploy(svg) {
  svg.setAttribute('viewBox','0 0 900 480');

  // Top: Orchestrator → GitOps → ArgoCD → OCP flow
  addBox(svg, 20, 20, 140, 50, BG.progress, COLORS.progress, 'Orchestrator', 'Generate files');
  addArrow(svg, 160, 45, 220, 45, COLORS.progress, 'cd0');
  addLabel(svg, 190, 33, 'commit', COLORS.progress, '9');

function drawFullStack(svg) {
  svg.setAttribute('viewBox','0 0 900 400');
  addLabel(svg, 450, 30, 'FULL-STACK ROLLBACK — Reverse Order', COLORS.amber, '14');

  const components = ['MRF','LIXP','CBF','CRDL','FUAG','MUAG','LRF','SCEAS','ENUMFE','AGW','FTAS','MTAS','IMC','CMS'];
  const cols = 7;
  const bw = 110, bh = 45, gx = 10, gy = 10;
  const ox = (900 - cols*(bw+gx) + gx) / 2;
  const oy = 60;

  components.forEach((name, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = ox + col * (bw + gx);
    const y = oy + row * (bh + gy);
    const b = addBox(svg, x, y, bw, bh, BG.healthy, COLORS.green, name, 'healthy');
    b.id = 'rb'+i;
  });

  // Sequence number labels
  components.forEach((_, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = ox + col * (bw + gx) + bw - 8;
    const y = oy + row * (bh + gy) + 10;
    addLabel(svg, x, y, String(i+1), COLORS.muted, '9');
  });

  addBox(svg, 300, 220, 300, 70, BG.pending, COLORS.pending, 'Rollback Progress', '...');
  const statusBox = document.querySelector('#diagramSvg > g:last-child');
  statusBox.id = 'rbProgress';

  // Animate domino rollback
  const tl = gsap.timeline({ delay:0.5 });
  components.forEach((name, i) => {
    tl.to(`#rb${i} rect`, { fill:BG.amber, stroke:COLORS.amber, duration:0.15 }, i*0.15)
      .to(`#rb${i} text:last-of-type`, { textContent:'rolled_back', duration:0.01 }, '<');
  });
  tl.to('#rbProgress rect', { fill:BG.amber, stroke:COLORS.amber, duration:0.3 })
    .to('#rbProgress text:first-of-type', { textContent:'Rollback Complete', duration:0.01 }, '<');
}

/* ─── NAVIGATION ─── */

function goToScene(idx) {
  const scenes = getScenes();
  if (idx < 0 || idx >= scenes.length) return;
  if (approvalNeeded && idx > currentScene) return; // blocked by approval

  currentScene = idx;
  document.getElementById('sceneTitle').textContent = scenes[idx].title;
  document.getElementById('sceneSubtitle').textContent = scenes[idx].sub;
  const counter = document.getElementById('sceneCounter');
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  if (counter) counter.textContent = `Scene ${idx+1} of ${scenes.length}`;
  if (prev) prev.disabled = idx === 0;
  if (next) next.disabled = idx === scenes.length - 1;

  renderData(idx);

  if (currentFlow === 'deploy') renderDeployScene(idx);
  else renderRollbackScene(idx);
}

function nextScene() { goToScene(currentScene + 1); }
function prevScene() { goToScene(currentScene - 1); }

function switchFlow(flow) {
  currentFlow = flow;
  currentScene = 0;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.flow === flow));
  goToScene(0);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextScene(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevScene(); }
});

// Init
goToScene(0);
</script>
