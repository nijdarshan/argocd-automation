<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architecture v2 — No Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --pending-bg: #21262d;
  --progress-bg: #0d1f3c;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }

.header { padding:10px 24px 6px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.header-title { font-size:1.3rem; font-weight:700; }
.header-sub { font-size:0.85rem; color:var(--muted); margin-top:2px; }

.canvas { flex:1; display:flex; align-items:center; justify-content:center; padding:16px 24px; }
.canvas svg { width:100%; height:100%; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Architecture Overview — v2</div>
  <div class="header-sub">Pipeline removed — Service Orchestrator commits to GitOps and watches ArgoCD directly</div>
</div>

<div class="canvas">
  <svg id="svg" viewBox="0 0 920 365"></svg>
</div>

<script>
const COLORS = { pending:'#8b949e', progress:'#58a6ff', muted:'#8b949e' };
const BG = { pending:'#21262d', progress:'#0d1f3c' };

function svgEl(tag, attrs, text) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  if (text !== undefined) el.textContent = text;
  return el;
}

function addBox(svg, x, y, w, h, fill, stroke, label, sub, id) {
  const g = svgEl('g', { id: id || '' });
  g.appendChild(svgEl('rect', { x, y, width:w, height:h, rx:10, ry:10, fill, stroke, 'stroke-width':2 }));
  g.appendChild(svgEl('text', { x:x+w/2, y:y+h/2-(sub?8:0), 'text-anchor':'middle', 'dominant-baseline':'central', fill:'#e6edf3', 'font-size':'14', 'font-weight':'600', 'font-family':'DM Sans,sans-serif' }, label));
  if (sub) g.appendChild(svgEl('text', { x:x+w/2, y:y+h/2+12, 'text-anchor':'middle', 'dominant-baseline':'central', fill:'#8b949e', 'font-size':'11', 'font-family':'DM Sans,sans-serif' }, sub));
  svg.appendChild(g);
  return g;
}

function addArrow(svg, x1, y1, x2, y2, color, id) {
  const mkId = 'ah'+(id||Math.random().toString(36).slice(2));
  const defs = svg.querySelector('defs') || svg.appendChild(svgEl('defs'));
  const marker = svgEl('marker', { id:mkId, viewBox:'0 0 10 7', refX:'10', refY:'3.5', markerWidth:'8', markerHeight:'6', orient:'auto-start-reverse' });
  marker.appendChild(svgEl('path', { d:'M 0 0 L 10 3.5 L 0 7 z', fill:color||'#8b949e' }));
  defs.appendChild(marker);
  const line = svgEl('line', { x1, y1, x2, y2, stroke:color||'#8b949e', 'stroke-width':'2', 'marker-end':`url(#${mkId})`, id:id||'' });
  svg.appendChild(line);
  return line;
}

function addPath(svg, d, color, id) {
  const mkId = 'ap'+(id||Math.random().toString(36).slice(2));
  const defs = svg.querySelector('defs') || svg.appendChild(svgEl('defs'));
  const marker = svgEl('marker', { id:mkId, viewBox:'0 0 10 7', refX:'10', refY:'3.5', markerWidth:'8', markerHeight:'6', orient:'auto-start-reverse' });
  marker.appendChild(svgEl('path', { d:'M 0 0 L 10 3.5 L 0 7 z', fill:color||'#8b949e' }));
  defs.appendChild(marker);
  const p = svgEl('path', { d, stroke:color||'#8b949e', 'stroke-width':'2', fill:'none', 'marker-end':`url(#${mkId})`, id:id||'' });
  svg.appendChild(p);
  return p;
}

function addLabel(svg, x, y, text, color, size) {
  const t = svgEl('text', { x, y, fill:color||'#8b949e', 'font-size':size||'11', 'font-family':'DM Sans,sans-serif', 'text-anchor':'middle', 'dominant-baseline':'central' }, text);
  svg.appendChild(t);
  return t;
}

const svg = document.getElementById('svg');

// ── BOXES (same positions as v1) ──

// Row 1: Service Orchestrator (x=335, y=10, 230x55)
const hub = addBox(svg, 335, 10, 230, 55, BG.progress, COLORS.progress, 'Service Orchestrator', 'Stateful · API-driven', 'archHub');

// Row 2: [empty @ x=70] | GitOps Repo (x=355) | ArgoCD (x=640)
addBox(svg, 355, 125, 190, 55, BG.pending, COLORS.pending, 'GitOps Repo', 'Source of truth');
addBox(svg, 640, 125, 190, 55, BG.pending, COLORS.pending, 'ArgoCD', 'Declarative sync');

// Row 3: Hub Database (x=70) | Nexus/Quay (x=355) | OCP Cluster (x=640)
addBox(svg, 70, 275, 190, 55, BG.pending, COLORS.pending, 'Hub Database', 'Deployment state');
addBox(svg, 355, 275, 190, 55, BG.pending, COLORS.pending, 'Nexus / Quay', 'Charts + Images');
addBox(svg, 640, 275, 190, 55, BG.pending, COLORS.pending, 'OCP Cluster', 'Kubernetes workloads');

// ── ARROWS ──

// SO → GitOps ("commits") — L-path: down from SO left side, then right to GitOps
addPath(svg, 'M 385 65 L 385 98 L 450 98 L 450 125', COLORS.progress, 'a1');
addLabel(svg, 415, 90, 'commits', COLORS.progress, '10');

// GitOps → ArgoCD (horizontal, same as v1)
addArrow(svg, 545, 152, 640, 152, COLORS.pending, 'a2');
addLabel(svg, 593, 142, 'detects', COLORS.muted, '10');

// ArgoCD → OCP Cluster (vertical down, same as v1)
addArrow(svg, 735, 180, 735, 275, COLORS.pending, 'a3');
addLabel(svg, 770, 227, 'syncs', COLORS.muted, '10');

// SO → ArgoCD ("watches") — L-path: down from SO right side, then right to ArgoCD
addPath(svg, 'M 515 65 L 515 98 L 735 98 L 735 125', COLORS.progress, 'a4');
addLabel(svg, 625, 90, 'watches', COLORS.progress, '10');

// SO → Hub DB ("reads / writes") — L-path: down from SO left, then left to DB
addPath(svg, 'M 370 65 L 370 98 L 165 98 L 165 275', COLORS.progress, 'a5');
addLabel(svg, 268, 90, 'reads / writes', COLORS.muted, '10');

// Nexus → GitOps (vertical up, same as v1)
addArrow(svg, 450, 275, 450, 180, COLORS.pending, 'a6');
addLabel(svg, 490, 227, 'chart refs', COLORS.muted, '9');

// ── ANIMATION ──
const tl = gsap.timeline();
tl.from('#archHub', { opacity:0, scale:0.9, duration:0.4, ease:'back.out(1.7)' });
tl.from('#svg > g:not(#archHub)', { opacity:0, y:15, duration:0.35, stagger:0.06, ease:'power2.out' }, 0.2);
tl.from('#svg > line, #svg > path', { opacity:0, duration:0.3, stagger:0.05 }, 0.5);
</script>
</body>
</html>
