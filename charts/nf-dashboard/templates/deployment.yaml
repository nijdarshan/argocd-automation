apiVersion: v1
kind: ConfigMap
metadata: { name: grafana-datasources }
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: {{ .Values.prometheus.url }}
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata: { name: grafana-dashboards-provider }
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: ''
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata: { name: grafana-dashboards }
data:
  nf-monitor.json: |
{{ .Files.Get "files/nf-monitor.json" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels: { app: grafana }
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports: [{ containerPort: 3000 }]
          env:
            - { name: GF_SECURITY_ADMIN_USER, value: {{ .Values.admin.user | quote }} }
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: {{ .Values.admin.password | quote }} }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 300m, memory: 512Mi }
          readinessProbe: { httpGet: { path: /api/health, port: 3000 }, initialDelaySeconds: 15 }
          livenessProbe: { httpGet: { path: /api/health, port: 3000 }, initialDelaySeconds: 30 }
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashboards-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
      volumes:
        - { name: datasources, configMap: { name: grafana-datasources } }
        - { name: dashboards-provider, configMap: { name: grafana-dashboards-provider } }
        - { name: dashboards, configMap: { name: grafana-dashboards } }
---
apiVersion: v1
kind: Service
metadata: { name: grafana }
spec:
  ports: [{ port: 3000 }]
  selector: { app: grafana }
