apiVersion: v1
kind: ConfigMap
metadata: { name: prometheus-config }
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
    {{- range .Values.scrapeTargets }}
      - job_name: {{ .jobName | quote }}
        scrape_interval: {{ .interval }}
        static_configs:
          - targets: [{{ .target | quote }}]
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels: { app: prometheus, version: {{ .Values.image.tag | quote }} }
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus, version: {{ .Values.image.tag | quote }} }
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          args: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time={{ .Values.retention }}", "--web.enable-lifecycle"]
          ports: [{ containerPort: 9090 }]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
          readinessProbe: { httpGet: { path: /-/ready, port: 9090 }, initialDelaySeconds: 10 }
          livenessProbe: { httpGet: { path: /-/healthy, port: 9090 }, initialDelaySeconds: 15 }
          volumeMounts: [{ name: config, mountPath: /etc/prometheus }]
      volumes:
        - name: config
          configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata: { name: prometheus }
spec:
  ports: [{ port: 9090 }]
  selector: { app: prometheus }
